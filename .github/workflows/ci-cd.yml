name: CI/CD Pipeline

# Triggers: runs on push to main and on pull requests to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Update
jobs:
  # Job 1: Run unit tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-auth-service
          - course-catalog-service
          - enrollment-service
          - notification-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      # Install dependencies
      - run: npm ci
      # Run tests
      - run: npm test -- --forceExit --if-present

  # Job 2: SonarCloud code quality and security scan
  sonarcloud:
    runs-on: ubuntu-latest
    needs: test # Only runs if test job passes
    strategy:
      matrix:
        service:
          - user-auth-service
          - course-catalog-service
          - enrollment-service
          - notification-service
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Full history needed for SonarCloud analysis
      - uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: ${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub token for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # SonarCloud authentication token

  # Job 3: Build Docker image and push to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: sonarcloud # Only runs if sonarcloud job passes
    strategy:
      matrix:
        service:
          - user-auth-service
          - course-catalog-service
          - enrollment-service
          - notification-service
    steps:
      - uses: actions/checkout@v3
      # Login to Docker Hub
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # Build and push Docker image
      - uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service }} # Dockerfile location
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
