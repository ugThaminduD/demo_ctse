openapi: 3.0.0
info:
  title: Notification Service API
  description: Notification service for Online Learning Platform
  version: 1.0.0
  contact:
    name: Chirathi Somadasa

servers:
  - url: http://localhost:3004
    description: Local development server
  - url: http://localhost:3000
    description: Via API Gateway

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SendNotificationRequest:
      type: object
      required:
        - type
      properties:
        to:
          type: string
          format: email
          example: student@example.com
        type:
          type: string
          enum: [welcome, enrollment_confirmation, new_course, custom]
          example: welcome
        userName:
          type: string
          example: John Doe
        courseTitle:
          type: string
          example: Intro to Node.js
        instructor:
          type: string
          example: Jane Smith
        enrollmentId:
          type: string
          example: ENR-12345
        message:
          type: string
          example: Welcome to the platform!

    NotificationLog:
      type: object
      properties:
        _id:
          type: string
          example: 69a91dd92f64596d389b0cef
        to:
          type: string
          example: student@example.com
        type:
          type: string
          example: welcome
        userName:
          type: string
          example: John Doe
        courseTitle:
          type: string
          example: Intro to Node.js
        instructor:
          type: string
          example: Jane Smith
        enrollmentId:
          type: string
          example: ENR-12345
        message:
          type: string
          example: Welcome to the platform!
        status:
          type: string
          enum: [sent, failed, pending]
          example: sent
        sentAt:
          type: string
          example: 2026-03-05T06:08:25.710Z

    SendNotificationResponse:
      type: object
      properties:
        message:
          type: string
          example: Notification sent
        id:
          type: string
          example: 69a91dd92f64596d389b0cef

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Server error
        error:
          type: string
          example: Failed

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: notificationservice

  /api/notifications/send:
    post:
      summary: Send notification
      tags: [Notifications]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationResponse'
        '500':
          description: Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/logs:
    get:
      summary: Get all notification logs (admin)
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logs returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationLog'
        '401':
          description: Unauthorized
        '500':
          description: Server error

  /api/notifications/logs/{email}:
    get:
      summary: Get notification logs for a user
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Logs returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationLog'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Server error
